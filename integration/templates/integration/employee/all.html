{% extends 'main/base.html' %}

{% block title %}
  Сотрудники
{% endblock %}

{% block content %}
  <div class="alert alert-primary" role="alert" style="display: none;"></div>

  <div class="modal fade" id="payment-info-dialog" tabindex="-1" aria-labelledby="payment-info-dialog-title" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" >
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="payment-info-dialog-title">Выплатная информация</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body container-fluid">
            <div class="row p-1">
                <table class="table table-sm table-bordered table-striped mb-0">
                  <thead class="table-light">
                      <tr>
                          <th style="width:50px;">#</th>
                          <th>БИК</th>
                          <th>Счёт</th>
                      </tr>
                  </thead>
                  <tbody id="payment-info-table-body">

                  </tbody>
              </table>
            </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Ok</button>
            </div>
        </div>
    </div>
  </div>

  <table id="employee-table" class="table table-sm table-bordered table-striped table-hover table-header-sm">
    <thead>
      <tr>
        <th style="width: 2%">ID</th>
        <th style="width: 6rem">Табельный</th>
        <th style="width: 6rem">Подр.</th>
        <th style="width: 10rem">Фамилия</th>
        <th style="width: 10rem">Имя</th>
        <th style="width: 10rem">Отчество</th>
        <th style="width: 20rem">Профессия</th>
        <th style="width: 6rem">Изменения</th>
        <th style="width: 6rem">Увольнение</th>
        <th style="width: 6rem">СНИЛС</th>
        <th style="width: 2rem"></th>
        {% comment %} <th style="width: 6rem">Лицевой счет</th> {% endcomment %}
      </tr>
    </thead>
  </table>

  <script type="text/javascript">
    $(document).ready(function () {
      var employeeTable = $('#employee-table').DataTable({
        ajax: {
          url: "{% url 'employee-list' %}?format=datatables",
          data: function (d) {}
        },
        rowId: 'id',
        columns: [
          {
            data: 'persId',
          },
          {
            data: 'empOrgNo'
          },
          {
            data: 'divNo'
          },
          {
            data: 'pfnSurname'
          },
          {
            data: 'pfnName'
          },
          {
            data: 'pfnPatronymic'
          },
          {
            data: 'profName'
          },
          {
            data: 'empChangesDate'
          },
          {
            data: 'empDismissDate'
          },
          {
            data: 'snils'
          },
          {
              data: 'accountNumber',
              defaultContent: '',
              orderable: false,
              searchable: false,
              className: 'text-center align-middle px-1',
              render: function (data, type, row) {
                  if (!data)
                      return ''
                  return `<a href="#" data-bs-toggle="modal" data-bs-target="#payment-info-dialog" data-payment-info="${data}" title="Выплатная информация"><i class="fa-duotone fa-xl fa-credit-card"></i></a>`
              }
          }
        ],
        buttons: [
          {
            text: '<i class="fa-light fa-upload me-2"></i>&nbsp;Загрузить',
            className: 'btn btn-success btn-sm',
            action: function (e, dt, node, config) {
              const alertEl = $('.alert')
              $.get('/integration/employees/load', function (e) {
                alertEl.attr('class', 'alert alert-success')
                alertEl.html(e)
              })
                .fail(function (e) {
                  alertEl.attr('class', 'alert alert-danger')
                  alertEl.html(e.responseText)
                })
                .always(function () {
                  alertEl.show().delay(3000).fadeOut()
                  employeeTable.ajax.reload()
                })
              //window.location.href = '/employees/load';
            }
          }
        ]
      })

      const modal = document.getElementById('payment-info-dialog');

      modal.addEventListener('show.bs.modal', function (event) {
          const button = event.relatedTarget;
          const rawData = button.dataset.paymentInfo;

          const tbody = modal.querySelector('#payment-info-table-body');
          tbody.innerHTML = '';

          if (!rawData) {
              return;
          }

          const parsed = rawData.split(';').map(function(item) {
              const [bik, account] = item.split(':');
              return { bik, account };
          });

          parsed.forEach(function(item, index) {
              tbody.innerHTML += `
                  <tr>
                      <td>${index + 1}</td>
                      <td>${item.bik}</td>
                      <td>${item.account}</td>
                  </tr>
              `;
          });
      });
    })
  </script>
{% endblock %}
